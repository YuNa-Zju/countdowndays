name: Release Desktop App

on:
  push:
    branches:
      - master # 🌟 master 分支 Push 时触发，用于预热缓存
    tags:
      - "v*" # 🌟 推标签时触发，用于正式发布
  workflow_dispatch:

# 🌟 自动取消正在进行的旧任务，节省资源
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --target universal-apple-darwin
          - os: windows-latest
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: 开启 Rust 魔法缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      # 🌟 核心逻辑判断：如果是 master 分支，只编译，不发布
      - name: 🛠️ 仅编译 (master 分支预热缓存)
        if: github.ref == 'refs/heads/master'
        run: npm run tauri build -- ${{ matrix.args }}
        env:
          # 即使不发布，Tauri 编译带更新器的包也需要私钥
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # 🌟 核心逻辑判断：如果是 v* 标签，执行正式发布
      - name: 🚀 正式打包并发布 (Tag 触发)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: "Momentary v__VERSION__"
          releaseBody: |
            ✨ Momentary 桌面端全新版本发布！
            🚀 更新内容：${{ github.event.head_commit.message }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
