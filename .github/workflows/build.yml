name: Release Desktop App

# 触发条件：当你推送以 v 开头的 tag 时（例如 v0.1.0）
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write # 允许 Action 自动在你的仓库创建 Release 页面

    # 🌟 核心魔法：构建矩阵，同时启动 Mac 和 Windows 虚拟机
    strategy:
      fail-fast: false # 如果其中一个系统打包失败，不要取消另一个系统的打包
      matrix:
        include:
          - os: macos-latest
            # macOS 打包为 Universal 通用程序（同时支持 M 芯片和 Intel 芯片）
            args: --target universal-apple-darwin
          - os: windows-latest
            # Windows 默认打包 x64 架构
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 推荐使用稳定的 Node 20

      # 安装 Rust 环境，并为 macOS 额外添加跨平台编译目标（为了 Universal 包）
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # 🌟 依赖安装：如果你用的是 pnpm，请改为 pnpm install
      - name: Install frontend dependencies
        run: npm install

      # 调用 Tauri 官方打包组件
      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 自动读取 tauri.conf.json 里的版本号
          tagName: app-v__VERSION__
          releaseName: "Momentary v__VERSION__"
          releaseBody: |
            ✨ Momentary 桌面端全新版本发布！

            📦 **下载说明：**
            - **Windows 用户**：请下载 `.msi` 或 `.exe` 安装包。
            - **macOS 用户**：请下载 `.dmg` 文件。

            ⚠️ **macOS 提示“应用已损坏”怎么办？**
            因为这是开源免费软件，未经过苹果高昂的付费签名。请将应用拖入「应用程序」文件夹后，打开「终端」并运行以下命令解锁：
            `sudo xattr -rd com.apple.quarantine /Applications/Momentary.app`

          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
