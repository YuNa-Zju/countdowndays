name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --target universal-apple-darwin
          - os: windows-latest
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 🌟 核心修复：只喂给它私钥，彻底剥离密码环境变量！
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        with:
          tagName: app-v__VERSION__
          releaseName: "Momentary v__VERSION__"

          releaseBody: |
            ✨ Momentary 桌面端全新版本发布！

            **🚀 本次更新内容：**
            ${{ github.event.head_commit.message }}

            ---
            📦 **下载说明：**
            - **Windows 用户**：可以直接等待软件内弹窗无感更新，或下载 `.msi` / `.exe` 覆盖安装。
            - **macOS 用户**：请下载 `.dmg` 文件。

            ⚠️ **macOS 提示“应用已损坏”怎么办？**
            因为这是开源免费软件，未经过苹果高昂的付费签名。请将应用拖入「应用程序」文件夹后，打开「终端」并运行以下命令解锁：
            `sudo xattr -rd com.apple.quarantine /Applications/Momentary.app`

          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
